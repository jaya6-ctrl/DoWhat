<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维护中 - DoWhat</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            overflow: hidden;
        }
        /* 像素网格 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
        }
        /* CRT 扫描线 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
            pointer-events: none;
        }
        .container { padding: 2rem; position: relative; z-index: 1; }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: bounce 1s step-end infinite;
        }
        h1 {
            font-size: 1.2rem;
            color: #f0c040;
            margin-bottom: 1.5rem;
            line-height: 2;
        }
        .line {
            font-size: 0.65rem;
            color: #7a7a9a;
            margin-bottom: 0.8rem;
            line-height: 1.8;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 2rem;
            padding: 8px 16px;
            border: 2px solid #2a2a4a;
            background: #1a1a2e;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
            font-size: 0.55rem;
            color: #7a7a9a;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #f0c040;
            animation: blink 1s step-end infinite;
        }
        .progress {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .bar {
            width: 20px;
            height: 6px;
            background: #2a2a4a;
        }
        .bar.active {
            animation: fill 3s step-end infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        @keyframes fill {
            0% { background: #f0c040; opacity: 0.2; }
            25% { background: #f0c040; opacity: 0.4; }
            50% { background: #f0c040; opacity: 0.6; }
            75% { background: #f0c040; opacity: 0.8; }
            100% { background: #f0c040; opacity: 1; }
        }
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            animation: twinkle 2s step-end infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%;left:15%;animation-delay:0s"></div>
        <div class="star" style="top:20%;left:70%;animation-delay:0.5s;width:3px;height:3px"></div>
        <div class="star" style="top:35%;left:40%;animation-delay:1s"></div>
        <div class="star" style="top:50%;left:85%;animation-delay:0.3s"></div>
        <div class="star" style="top:65%;left:25%;animation-delay:0.8s;width:3px;height:3px"></div>
        <div class="star" style="top:75%;left:55%;animation-delay:1.2s"></div>
        <div class="star" style="top:15%;left:90%;animation-delay:0.6s"></div>
        <div class="star" style="top:80%;left:10%;animation-delay:1.5s"></div>
    </div>

    <div class="container">
        <div class="icon">🔧</div>
        <h1>SYSTEM MAINTENANCE</h1>
        <p class="line">我们正在升级游戏服务器</p>
        <p class="line">马上回来，敬请期待...</p>

        <div class="progress">
            <div class="bar active" style="animation-delay:0s"></div>
            <div class="bar active" style="animation-delay:0.3s"></div>
            <div class="bar active" style="animation-delay:0.6s"></div>
            <div class="bar active" style="animation-delay:0.9s"></div>
            <div class="bar active" style="animation-delay:1.2s"></div>
        </div>

        <div class="status">
            <div class="dot"></div>
            ESTIMATED TIME: 10-30 MIN
        </div>
    </div>
</body>
</html>
