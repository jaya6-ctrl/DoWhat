<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
    <radialGradient id="black" cx=".35" cy=".35" r=".7">
      <stop offset="0" stop-color="#555"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="white" cx=".35" cy=".35" r=".7">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#bbb"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- board -->
  <rect x="110" y="30" width="180" height="180" rx="6" fill="#e9c787"/>
  <g stroke="#5b3a1a" stroke-width="0.8">
    <!-- 9x9 grid lines for compact display -->
    <line x1="120" y1="40" x2="280" y2="40"/>
    <line x1="120" y1="60" x2="280" y2="60"/>
    <line x1="120" y1="80" x2="280" y2="80"/>
    <line x1="120" y1="100" x2="280" y2="100"/>
    <line x1="120" y1="120" x2="280" y2="120"/>
    <line x1="120" y1="140" x2="280" y2="140"/>
    <line x1="120" y1="160" x2="280" y2="160"/>
    <line x1="120" y1="180" x2="280" y2="180"/>
    <line x1="120" y1="200" x2="280" y2="200"/>
    <line x1="120" y1="40" x2="120" y2="200"/>
    <line x1="140" y1="40" x2="140" y2="200"/>
    <line x1="160" y1="40" x2="160" y2="200"/>
    <line x1="180" y1="40" x2="180" y2="200"/>
    <line x1="200" y1="40" x2="200" y2="200"/>
    <line x1="220" y1="40" x2="220" y2="200"/>
    <line x1="240" y1="40" x2="240" y2="200"/>
    <line x1="260" y1="40" x2="260" y2="200"/>
    <line x1="280" y1="40" x2="280" y2="200"/>
  </g>
  <!-- diagonal black 4-in-a-row + threat -->
  <circle cx="160" cy="100" r="9" fill="url(#black)"/>
  <circle cx="180" cy="120" r="9" fill="url(#black)"/>
  <circle cx="200" cy="140" r="9" fill="url(#black)"/>
  <circle cx="220" cy="160" r="9" fill="url(#black)"/>
  <!-- threat marker on the open end -->
  <circle cx="240" cy="180" r="9" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 2"/>
  <!-- white blocking attempts -->
  <circle cx="140" cy="80" r="9" fill="url(#white)"/>
  <circle cx="200" cy="80" r="9" fill="url(#white)"/>
  <circle cx="160" cy="160" r="9" fill="url(#white)"/>
  <circle cx="240" cy="120" r="9" fill="url(#white)"/>
  <!-- last move highlight -->
  <rect x="214" y="154" width="12" height="12" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <!-- title -->
  <text x="200" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="#fff" letter-spacing="6">五 子 棋</text>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Gomoku · 智斗 AI</text>
</svg>
