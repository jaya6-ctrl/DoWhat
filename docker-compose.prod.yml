services:
  nginx:
    image: nginx:1.28-alpine
    container_name: dowhat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - nginx_maintenance:/etc/nginx  # 用于维护模式标志文件
    depends_on:
      - app
    networks:
      - dowhat-net

  app:
    # 使用具体版本标签，通过 docker/build.sh 构建并获取镜像名称
    # 首次部署请先运行: bash docker/build.sh
    image: dowhat-app:latest  # 替换为 build.sh 输出的镜像名称，如 dowhat-app:v20240606123456
    container_name: dowhat-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - dowhat-net
    expose:
      - "3000"
    volumes:
      - dowhat_avatars:/app/public/avatars

  postgres:
    image: postgres:16-alpine
    container_name: dowhat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dowhat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dowhat}
      POSTGRES_DB: ${POSTGRES_DB:-dowhat}
    networks:
      - dowhat-net
    # 仅绑宿主机 loopback,外网访问不到;build 时通过 network:host 走 localhost 连过来
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dowhat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dowhat} -d ${POSTGRES_DB:-dowhat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dowhat-redis
    restart: unless-stopped
    networks:
      - dowhat-net
    volumes:
      - dowhat_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: dowhat-mailpit
    restart: unless-stopped
    networks:
      - dowhat-net
    ports:
      # Web UI 仅绑本机 loopback,外网看不到。通过 SSH 端口转发查看。
      - "127.0.0.1:8025:8025"

networks:
  # 显式命名的网络,build 阶段也要 join 进来
  dowhat-net:
    name: dowhat-net

volumes:
  dowhat_pg_data:
  dowhat_redis_data:
  dowhat_avatars:
  nginx_maintenance:
