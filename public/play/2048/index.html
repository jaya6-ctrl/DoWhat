<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2048</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; touch-action: none; }
      html, body { margin: 0; padding: 0; height: 100%; background: #faf8ef; color: #776e65; font-family: system-ui, sans-serif; }
      body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 12px; }
      header { display: flex; gap: 12px; align-items: center; }
      h1 { margin: 0; font-size: 36px; color: #776e65; }
      .score { background: #bbada0; color: #fff; padding: 8px 12px; border-radius: 4px; font-weight: 700; min-width: 70px; text-align: center; }
      .score small { display: block; font-size: 10px; opacity: 0.7; font-weight: 400; }
      #board { background: #bbada0; border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .cell { width: 70px; height: 70px; border-radius: 4px; background: #cdc1b4; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; transition: all 0.1s ease; }
      .v2 { background: #eee4da; color: #776e65; }
      .v4 { background: #ede0c8; color: #776e65; }
      .v8 { background: #f2b179; color: #fff; }
      .v16 { background: #f59563; color: #fff; }
      .v32 { background: #f67c5f; color: #fff; }
      .v64 { background: #f65e3b; color: #fff; }
      .v128 { background: #edcf72; color: #fff; font-size: 24px; }
      .v256 { background: #edcc61; color: #fff; font-size: 24px; }
      .v512 { background: #edc850; color: #fff; font-size: 24px; }
      .v1024 { background: #edc53f; color: #fff; font-size: 20px; }
      .v2048 { background: #edc22e; color: #fff; font-size: 20px; }
      button { background: #8f7a66; color: #fff; border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 700; }
      .hint { font-size: 12px; color: #776e65; opacity: 0.7; }
      #overlay { position: fixed; inset: 0; background: rgba(238,228,218,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
      #overlay.show { display: flex; }
      #overlay .title { font-size: 48px; font-weight: 700; color: #776e65; }
    </style>
  </head>
  <body>
    <header>
      <h1>2048</h1>
      <div class="score"><small>SCORE</small><span id="score">0</span></div>
      <div class="score"><small>BEST</small><span id="best">0</span></div>
    </header>
    <div id="board"></div>
    <button id="newGame">新游戏</button>
    <div class="hint">方向键 / WASD / 滑动屏幕</div>

    <div id="overlay">
      <div class="title">Game Over</div>
      <div>分数：<span id="finalScore">0</span></div>
      <button id="restart">再来一局</button>
    </div>

    <script>
      const SIZE = 4;
      const boardEl = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const overlay = document.getElementById("overlay");
      const finalScoreEl = document.getElementById("finalScore");

      let grid, score, best = +(localStorage.getItem("2048-best") || 0), startTime;
      bestEl.textContent = best;

      function reset() {
        grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        score = 0;
        addRandom(); addRandom();
        overlay.classList.remove("show");
        startTime = Date.now();
        try { parent.postMessage({ type: "game_start", payload: { slug: "2048" } }, "*"); } catch (_) {}
        render();
      }

      function addRandom() {
        const empty = [];
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!grid[r][c]) empty.push([r, c]);
        if (!empty.length) return;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function render() {
        boardEl.innerHTML = "";
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
          const v = grid[r][c];
          const cell = document.createElement("div");
          cell.className = "cell" + (v ? ` v${v}` : "");
          cell.textContent = v || "";
          boardEl.appendChild(cell);
        }
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem("2048-best", best); }
      }

      function compact(line) {
        const filtered = line.filter((x) => x);
        for (let i = 0; i < filtered.length - 1; i++) {
          if (filtered[i] === filtered[i + 1]) { filtered[i] *= 2; score += filtered[i]; filtered.splice(i + 1, 1); }
        }
        while (filtered.length < SIZE) filtered.push(0);
        return filtered;
      }

      function rotate(g) {
        const n = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) n[c][SIZE - 1 - r] = g[r][c];
        return n;
      }

      function move(dir) {
        // 0=left,1=up,2=right,3=down
        let g = grid;
        for (let i = 0; i < dir; i++) g = rotate(g);
        const before = JSON.stringify(g);
        g = g.map(compact);
        const moved = JSON.stringify(g) !== before;
        for (let i = 0; i < (4 - dir) % 4; i++) g = rotate(g);
        grid = g;
        if (moved) { addRandom(); render(); if (isOver()) endGame(); }
      }

      function isOver() {
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
          if (!grid[r][c]) return false;
          if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
          if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
        }
        return true;
      }

      function endGame() {
        finalScoreEl.textContent = score;
        overlay.classList.add("show");
        try {
          parent.postMessage({
            type: "game_end",
            payload: { slug: "2048", score, duration: Math.round((Date.now() - startTime) / 1000) },
          }, "*");
        } catch (_) {}
      }

      const KEYS = { ArrowLeft: 0, a: 0, A: 0, ArrowUp: 1, w: 1, W: 1, ArrowRight: 2, d: 2, D: 2, ArrowDown: 3, s: 3, S: 3 };
      window.addEventListener("keydown", (e) => { if (e.key in KEYS) { move(KEYS[e.key]); e.preventDefault(); } });
      let touchStart = null;
      window.addEventListener("touchstart", (e) => { touchStart = e.touches[0]; }, { passive: true });
      window.addEventListener("touchend", (e) => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.clientX, dy = t.clientY - touchStart.clientY;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 2 : 0); else move(dy > 0 ? 1 : 3);
      });

      document.getElementById("newGame").addEventListener("click", reset);
      document.getElementById("restart").addEventListener("click", reset);
      reset();
    </script>
  </body>
</html>
