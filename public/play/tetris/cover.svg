<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <rect width="400" height="300" fill="url(#grid)"/>
  <!-- playfield frame -->
  <rect x="130" y="20" width="140" height="240" rx="6" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- stacked blocks bottom -->
  <g>
    <!-- row -2 (near bottom) Z + L pieces -->
    <g fill="#f87171"><rect x="138" y="228" width="20" height="20" rx="2"/><rect x="158" y="228" width="20" height="20" rx="2"/><rect x="158" y="248" width="20" height="20" rx="2"/><rect x="178" y="248" width="20" height="20" rx="2"/></g>
    <g fill="#fb923c"><rect x="198" y="248" width="20" height="20" rx="2"/><rect x="218" y="248" width="20" height="20" rx="2"/><rect x="238" y="248" width="20" height="20" rx="2"/><rect x="238" y="228" width="20" height="20" rx="2"/></g>
    <g fill="#facc15"><rect x="138" y="208" width="20" height="20" rx="2"/><rect x="198" y="228" width="20" height="20" rx="2"/></g>
    <g fill="#34d399"><rect x="218" y="228" width="20" height="20" rx="2"/><rect x="198" y="208" width="20" height="20" rx="2"/></g>
    <g fill="#60a5fa"><rect x="178" y="228" width="20" height="20" rx="2"/></g>
  </g>
  <!-- falling T piece -->
  <g fill="#a78bfa">
    <rect x="178" y="80" width="20" height="20" rx="2"/>
    <rect x="198" y="80" width="20" height="20" rx="2"/>
    <rect x="218" y="80" width="20" height="20" rx="2"/>
    <rect x="198" y="100" width="20" height="20" rx="2"/>
  </g>
  <!-- I piece on right side -->
  <g fill="#22d3ee" opacity="0.85">
    <rect x="298" y="40" width="18" height="18" rx="2"/>
    <rect x="298" y="60" width="18" height="18" rx="2"/>
    <rect x="298" y="80" width="18" height="18" rx="2"/>
    <rect x="298" y="100" width="18" height="18" rx="2"/>
  </g>
  <!-- O piece on left side -->
  <g fill="#facc15" opacity="0.85">
    <rect x="68" y="60" width="20" height="20" rx="2"/>
    <rect x="88" y="60" width="20" height="20" rx="2"/>
    <rect x="68" y="80" width="20" height="20" rx="2"/>
    <rect x="88" y="80" width="20" height="20" rx="2"/>
  </g>
  <!-- ghost outline showing soft drop hint -->
  <g fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="1.5" stroke-dasharray="3 2">
    <rect x="178" y="188" width="20" height="20" rx="2"/>
    <rect x="198" y="188" width="20" height="20" rx="2"/>
    <rect x="218" y="188" width="20" height="20" rx="2"/>
    <rect x="198" y="208" width="20" height="20" rx="2"/>
  </g>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="#fff" letter-spacing="4">俄 罗 斯 方 块</text>
</svg>
