services:
  postgres:
    image: postgres:16-alpine
    container_name: dowhat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dowhat
      POSTGRES_PASSWORD: dowhat
      POSTGRES_DB: dowhat
    ports:
      - "5432:5432"
    volumes:
      - dowhat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dowhat -d dowhat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dowhat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dowhat_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: dowhat-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  dowhat_pg_data:
  dowhat_redis_data:
