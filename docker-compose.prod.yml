services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # buildkit 只支持 host/none/default,用 host 让 build 容器共享宿主机网络命名空间
      # build 容器里访问 localhost:5432 == 宿主机 loopback 上 postgres 暴露的 5432
      network: host
      args:
        DATABASE_URL: ${BUILD_DATABASE_URL}
    image: dowhat-app:latest
    container_name: dowhat-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - dowhat-net
    ports:
      - "3000:3000"
    volumes:
      - dowhat_avatars:/app/public/avatars

  postgres:
    image: postgres:16-alpine
    container_name: dowhat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dowhat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dowhat}
      POSTGRES_DB: ${POSTGRES_DB:-dowhat}
    networks:
      - dowhat-net
    # 仅绑宿主机 loopback,外网访问不到;build 时通过 network:host 走 localhost 连过来
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dowhat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dowhat} -d ${POSTGRES_DB:-dowhat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dowhat-redis
    restart: unless-stopped
    networks:
      - dowhat-net
    volumes:
      - dowhat_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: dowhat-mailpit
    restart: unless-stopped
    networks:
      - dowhat-net
    ports:
      # Web UI 仅绑本机 loopback,外网看不到。通过 SSH 端口转发查看。
      - "127.0.0.1:8025:8025"

networks:
  # 显式命名的网络,build 阶段也要 join 进来
  dowhat-net:
    name: dowhat-net

volumes:
  dowhat_pg_data:
  dowhat_redis_data:
  dowhat_avatars:
