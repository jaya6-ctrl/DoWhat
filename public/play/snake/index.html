<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>贪吃蛇</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0e1116; color: #e8eaed; font-family: system-ui, sans-serif; }
      body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
      h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 1px; color: #9ca3af; }
      #score { font-size: 20px; font-weight: 700; }
      canvas { background: #1a1f2a; border-radius: 8px; touch-action: none; max-width: 95vw; max-height: 70vh; }
      .hint { font-size: 12px; color: #6b7280; }
      button { background: #ff6a00; color: #fff; border: 0; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
      button:hover { background: #e85f00; }
      #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: rgba(0,0,0,0.7); }
      #overlay.show { display: flex; }
      #overlay .title { font-size: 28px; font-weight: 700; }
    </style>
  </head>
  <body>
    <h1>SNAKE · 贪吃蛇</h1>
    <div id="score">0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="hint">方向键 / WASD 控制，移动端滑动屏幕</div>

    <div id="overlay">
      <div class="title">Game Over</div>
      <div>最终分数：<span id="finalScore">0</span></div>
      <button id="restart">重新开始</button>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const overlay = document.getElementById("overlay");
      const scoreEl = document.getElementById("score");
      const finalScoreEl = document.getElementById("finalScore");
      const restartBtn = document.getElementById("restart");

      const COLS = 20, ROWS = 20;
      const CELL = canvas.width / COLS;
      let snake, dir, nextDir, food, score, timer, alive, startTime;

      function reset() {
        snake = [{ x: 10, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = dir;
        score = 0;
        scoreEl.textContent = score;
        placeFood();
        alive = true;
        overlay.classList.remove("show");
        startTime = Date.now();
        // postMessage to parent: game start
        try { parent.postMessage({ type: "game_start", payload: { slug: "snake" } }, "*"); } catch (_) {}
        clearInterval(timer);
        timer = setInterval(step, 110);
      }

      function placeFood() {
        while (true) {
          const f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
          if (!snake.some((s) => s.x === f.x && s.y === f.y)) { food = f; return; }
        }
      }

      function step() {
        if (!alive) return;
        // forbid reversing
        if ((nextDir.x !== -dir.x || nextDir.y !== -dir.y) && (nextDir.x || nextDir.y)) {
          dir = nextDir;
        }
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some((s) => s.x === head.x && s.y === head.y)) {
          gameOver();
          return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = score;
          placeFood();
        } else {
          snake.pop();
        }
        draw();
      }

      function draw() {
        ctx.fillStyle = "#1a1f2a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff6a00";
        ctx.fillRect(food.x * CELL, food.y * CELL, CELL - 1, CELL - 1);
        snake.forEach((s, i) => {
          ctx.fillStyle = i === 0 ? "#34d399" : "#10b981";
          ctx.fillRect(s.x * CELL, s.y * CELL, CELL - 1, CELL - 1);
        });
      }

      function gameOver() {
        alive = false;
        clearInterval(timer);
        finalScoreEl.textContent = score;
        overlay.classList.add("show");
        try {
          parent.postMessage({
            type: "game_end",
            payload: { slug: "snake", score, duration: Math.round((Date.now() - startTime) / 1000) },
          }, "*");
        } catch (_) {}
      }

      const KEYS = {
        ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
      };
      window.addEventListener("keydown", (e) => {
        if (KEYS[e.key]) { nextDir = KEYS[e.key]; e.preventDefault(); }
      });

      // touch
      let touchStart = null;
      canvas.addEventListener("touchstart", (e) => { touchStart = e.touches[0]; }, { passive: true });
      canvas.addEventListener("touchend", (e) => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.clientX;
        const dy = t.clientY - touchStart.clientY;
        if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
        else nextDir = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
      });

      restartBtn.addEventListener("click", reset);
      reset();
    </script>
  </body>
</html>
