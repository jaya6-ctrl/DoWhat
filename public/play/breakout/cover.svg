<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="ball" cx=".3" cy=".3" r=".7">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fb923c"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- distant stars -->
  <g fill="#fff" opacity=".4">
    <circle cx="30" cy="30" r="1"/>
    <circle cx="90" cy="20" r="1"/>
    <circle cx="370" cy="35" r="1.2"/>
    <circle cx="60" cy="200" r="1"/>
    <circle cx="350" cy="190" r="1"/>
  </g>
  <!-- bricks -->
  <g>
    <g fill="#ef4444">
      <rect x="40" y="45" width="40" height="14" rx="2"/>
      <rect x="84" y="45" width="40" height="14" rx="2"/>
      <rect x="128" y="45" width="40" height="14" rx="2"/>
      <rect x="172" y="45" width="40" height="14" rx="2"/>
      <rect x="216" y="45" width="40" height="14" rx="2"/>
      <rect x="260" y="45" width="40" height="14" rx="2"/>
      <rect x="304" y="45" width="40" height="14" rx="2"/>
    </g>
    <g fill="#f97316">
      <rect x="40" y="63" width="40" height="14" rx="2"/>
      <rect x="84" y="63" width="40" height="14" rx="2"/>
      <rect x="128" y="63" width="40" height="14" rx="2"/>
      <rect x="216" y="63" width="40" height="14" rx="2"/>
      <rect x="260" y="63" width="40" height="14" rx="2"/>
      <rect x="304" y="63" width="40" height="14" rx="2"/>
    </g>
    <g fill="#facc15">
      <rect x="40" y="81" width="40" height="14" rx="2"/>
      <rect x="84" y="81" width="40" height="14" rx="2"/>
      <rect x="216" y="81" width="40" height="14" rx="2"/>
      <rect x="260" y="81" width="40" height="14" rx="2"/>
      <rect x="304" y="81" width="40" height="14" rx="2"/>
    </g>
    <g fill="#22c55e">
      <rect x="40" y="99" width="40" height="14" rx="2"/>
      <rect x="216" y="99" width="40" height="14" rx="2"/>
      <rect x="304" y="99" width="40" height="14" rx="2"/>
    </g>
  </g>
  <!-- ball + trail -->
  <circle cx="190" cy="180" r="3" fill="#fb923c" opacity=".3"/>
  <circle cx="185" cy="170" r="2" fill="#fb923c" opacity=".15"/>
  <circle cx="195" cy="190" r="8" fill="url(#ball)"/>
  <!-- paddle -->
  <rect x="150" y="225" width="100" height="10" rx="5" fill="#e2e8f0"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#fff" letter-spacing="3">打 砖 块</text>
</svg>
