<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站维护中 - DoWhat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            text-align: center;
        }
        .container { padding: 2rem; }
        .icon { font-size: 5rem; margin-bottom: 1rem; animation: bounce 2s infinite; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 0.5rem; }
        .time { font-size: 1rem; opacity: 0.7; margin-top: 1rem; }
        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎮</div>
        <h1>网站维护中</h1>
        <p>我们正在升级游戏服务器</p>
        <p>马上回来，敬请期待<span class="dots"></span></p>
        <p class="time">⏱️ 预计恢复时间：10-30 分钟</p>
    </div>
</body>
</html>
