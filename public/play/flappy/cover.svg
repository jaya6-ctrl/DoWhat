<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset=".5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- clouds -->
  <g fill="rgba(255,255,255,0.85)">
    <circle cx="60" cy="50" r="14"/>
    <circle cx="76" cy="55" r="11"/>
    <circle cx="46" cy="55" r="10"/>
    <circle cx="320" cy="80" r="12"/>
    <circle cx="336" cy="85" r="9"/>
    <circle cx="306" cy="85" r="9"/>
  </g>
  <!-- back pipe pair (faded) -->
  <g opacity=".55">
    <rect x="290" y="0" width="50" height="80" fill="url(#pipe)"/>
    <rect x="285" y="62" width="60" height="16" fill="#15803d"/>
    <rect x="290" y="180" width="50" height="80" fill="url(#pipe)"/>
    <rect x="285" y="180" width="60" height="16" fill="#15803d"/>
  </g>
  <!-- front pipe pair -->
  <rect x="200" y="0" width="56" height="100" fill="url(#pipe)"/>
  <rect x="194" y="82" width="68" height="18" fill="#15803d"/>
  <rect x="208" y="0" width="6" height="100" fill="rgba(255,255,255,0.3)"/>
  <rect x="200" y="190" width="56" height="70" fill="url(#pipe)"/>
  <rect x="194" y="190" width="68" height="18" fill="#15803d"/>
  <rect x="208" y="208" width="6" height="52" fill="rgba(255,255,255,0.3)"/>
  <!-- ground -->
  <rect x="0" y="260" width="400" height="40" fill="#ded895"/>
  <rect x="0" y="260" width="400" height="6" fill="#84cc16"/>
  <!-- bird -->
  <g transform="translate(110 150) rotate(-10)">
    <circle r="22" fill="#fcd34d" stroke="#a16207" stroke-width="2"/>
    <ellipse cx="-3" cy="4" rx="13" ry="7" fill="#f59e0b"/>
    <polygon points="22,-3 34,1 22,5" fill="#ea580c"/>
    <circle cx="8" cy="-7" r="6" fill="#fff"/>
    <circle cx="10" cy="-7" r="3" fill="#111"/>
  </g>
  <!-- score -->
  <text x="200" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="900" fill="rgba(0,0,0,0.3)">12</text>
  <text x="198" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="900" fill="#fff">12</text>
  <!-- title -->
  <text x="200" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="#1e3a8a" letter-spacing="4">飞 翔 小 鸟</text>
</svg>
